services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: vue-app-dev
    ports:
      - "3000:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=development
    volumes:
      # Mount source code để hot reload
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
      # Dùng named volume cho node_modules (tránh conflict host/container)
      - node_modules_dev:/app/node_modules
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  node_modules_dev:
    driver: local
